# Backend CI/CD Pipeline
# Builds Docker image, pushes to Docker Hub, and deploys to VPS
name: Backend Deploy

on:
  push:
    branches:
      - main
    paths: # only trigger on changes to these files
      - "server/**"
      - "packages/shared/**"
      - "Dockerfile"
      - "docker-compose.yml"
      - ".github/workflows/backend-deploy.yml"
  workflow_dispatch: # Allow manual trigger

env:
  DOCKER_IMAGE: vohs/vollio-server

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: vohs
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          # Add linux/arm64 if your VPS uses ARM architecture

  deploy:
    name: Deploy to VPS
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            cd ~/services/vollio-server

            # Login to Docker Hub (required for private images)
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u vohs --password-stdin

            # Pull the latest image
            docker pull vohs/vollio-server:latest

            # Restart the container with the new image
            docker compose down vollio-server || true
            docker compose up -d

            # Clean up old images
            docker image prune -f

            # Show status
            docker compose ps

      - name: Health Check
        run: |
          echo "Waiting for server to start..."
          sleep 15

          # Perform health check (adjust URL as needed)
          response=$(curl -s -o /dev/null -w "%{http_code}" https://api.vollio.xyz/health || echo "000")

          if [ "$response" = "200" ]; then
            echo "✅ Health check passed! Server is running."
          else
            echo "⚠️ Health check returned: $response"
            echo "Server might still be starting up or there's an issue."
          fi
