services:
  vollio-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: vollio-server:latest
    container_name: vollio-server
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - server/.env
    depends_on:
      redis:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: vollio-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes

volumes:
  redis_data: